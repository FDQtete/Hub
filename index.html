<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>UDP Hub — Vicente</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="earth" aria-hidden="true"></canvas>

  <div id="app">
    <header id="topbar">
      <button id="backBtn" class="back-btn hidden" aria-label="Volver">← Volver</button>
      <h1 id="crumbTitle">UDP Hub</h1>
      <div id="clock" class="clock" aria-label="Fecha y hora">
        <span id="clockTime" class="clock-time">--:--</span>
        <span id="clockDate" class="clock-date"></span>
      </div>
    </header>

    <section id="jarvis" class="jarvis" aria-label="Asistente Jarvis">
      <div class="jarvis-head">
        <span class="jarvis-dot" aria-hidden="true"></span>
        <span class="jarvis-name">Jarvis</span>
        <span class="jarvis-status">en línea</span>
        <button id="jarvisToggle" class="jarvis-toggle" aria-label="Minimizar chat">▾</button>
      </div>
      <div id="jarvisMessages" class="jarvis-messages"></div>
      <form id="jarvisForm" class="jarvis-input">
        <input id="jarvisField" type="text" autocomplete="off" placeholder="Escríbele a Jarvis…" />
        <button id="jarvisSend" type="submit" aria-label="Enviar">➤</button>
      </form>
    </section>

    <main id="stage">
      <svg id="lines" aria-hidden="true"></svg>
      <div id="center-bubble" class="bubble center">
        <span class="bubble-icon">🎓</span>
        <span class="bubble-label">UDP</span>
      </div>
      <div id="bubble-field"></div>
    </main>

    <section id="panel" class="panel hidden">
      <div class="panel-header">
        <h2 id="panelTitle"></h2>
        <button id="closePanel" class="close-btn" aria-label="Cerrar">✕</button>
      </div>
      <div id="panelBody" class="panel-body"></div>
    </section>
  </div>

  <script src="earth.js"></script>
  <script src="app.js"></script>
</body>
</html>
